# Railway deployment configuration for MaMutuelle Laravel Backend

[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_pgsql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.bcmath", "composer"]

[phases.install]
cmds = ["cd backend && composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
    "cd backend",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan migrate --force || echo 'Migration skipped - database not ready'"
]

[start]
cmd = "cd backend && php artisan serve --host=0.0.0.0 --port=$PORT"