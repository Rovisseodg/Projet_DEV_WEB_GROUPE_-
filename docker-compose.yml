# 🐳 Docker Compose - MaMutuelle (Développement Local)
version: '3.8'

services:
  # ===== Application Laravel =====
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mamutuelle_app
    restart: unless-stopped
    ports:
      - "8000:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=mamutuelle
      - DB_USERNAME=mamutuelle_user
      - DB_PASSWORD=mamutuelle_pass_local
      - APP_KEY=base64:2Fh6U9w3Z8qTs1rV7yN0mJ6LxQ4pRfB2sC0gHjKlMzQ=
      - JWT_SECRET=local-jwt-secret-not-for-production
      - APP_URL=http://localhost:8000
      - LOG_CHANNEL=stderr
      - RUN_MIGRATIONS=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mamutuelle
    volumes:
      - ./backend/storage:/var/www/html/backend/storage

  # ===== PostgreSQL Database =====
  db:
    image: postgres:15-alpine
    container_name: mamutuelle_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mamutuelle
      POSTGRES_USER: mamutuelle_user
      POSTGRES_PASSWORD: mamutuelle_pass_local
      POSTGRES_INITDB_ARGS: -E UTF8 --locale=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - mamutuelle
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mamutuelle_user -d mamutuelle"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== PostgreSQL Admin UI (optionnel) =====
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mamutuelle_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mamutuelle.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - mamutuelle
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local

networks:
  mamutuelle:
    driver: bridge

      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - mamutuelle

  # Serveur web Nginx
  nginx:
    image: nginx:alpine
    container_name: mamutuelle_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/var/www/frontend
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/ssl/certs
    depends_on:
      - app
      - db
    networks:
      - mamutuelle

  # Redis (optionnel pour cache/sessions)
  redis:
    image: redis:alpine
    container_name: mamutuelle_redis
    restart: unless-stopped
    networks:
      - mamutuelle

volumes:
  postgres_data:

networks:
  mamutuelle:
    driver: bridge