# 🐳 Docker Compose - MaMutuelle
version: '3.8'

services:
  # Application Laravel
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mamutuelle_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/vendor:/var/www/vendor
    networks:
      - mamutuelle

  # Base de données PostgreSQL
  db:
    image: postgres:13
    container_name: mamutuelle_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mamutuelle
      POSTGRES_USER: mamutuelle_user
      POSTGRES_PASSWORD: mamutuelle_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - mamutuelle

  # Serveur web Nginx
  nginx:
    image: nginx:alpine
    container_name: mamutuelle_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/var/www/frontend
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/ssl/certs
    depends_on:
      - app
      - db
    networks:
      - mamutuelle

  # Redis (optionnel pour cache/sessions)
  redis:
    image: redis:alpine
    container_name: mamutuelle_redis
    restart: unless-stopped
    networks:
      - mamutuelle

volumes:
  postgres_data:

networks:
  mamutuelle:
    driver: bridge